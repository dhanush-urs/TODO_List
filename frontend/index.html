<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List - Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📝 TODO List</h1>
            <button id="darkModeToggle" class="icon-btn" title="Toggle Dark Mode">🌙</button>
        </header>

        <!-- Task Statistics -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedTasks">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingTasks">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card progress-card">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="stat-label" id="completionRate">0% Complete</div>
            </div>
        </div>

        <!-- Add Task Form -->
        <div class="add-task-section">
            <h2>Add New Task</h2>
            <form id="addTaskForm">
                <div class="form-row">
                    <input type="text" id="taskTitle" placeholder="Task title *" required>
                    <select id="taskPriority">
                        <option value="LOW">Low Priority</option>
                        <option value="MEDIUM" selected>Medium Priority</option>
                        <option value="HIGH">High Priority</option>
                    </select>
                </div>
                <div class="form-row">
                    <input type="date" id="taskDueDate">
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </div>
                <textarea id="taskDescription" placeholder="Task description (optional)" rows="2"></textarea>
            </form>
        </div>

        <!-- Filters and Search -->
        <div class="controls-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search tasks...">
            </div>
            <div class="filters">
                <select id="statusFilter">
                    <option value="all">All Tasks</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
                <select id="priorityFilter">
                    <option value="">All Priorities</option>
                    <option value="HIGH">High</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="LOW">Low</option>
                </select>
                <select id="sortBy">
                    <option value="created_at">Sort by Created</option>
                    <option value="due_date">Sort by Due Date</option>
                    <option value="priority">Sort by Priority</option>
                </select>
            </div>
        </div>

        <!-- Tasks List -->
        <div class="tasks-section">
            <h2>Your Tasks</h2>
            <div id="tasksList" class="tasks-list">
                <!-- Tasks will be rendered here -->
            </div>
            <div id="emptyState" class="empty-state">
                <p>No tasks yet. Add your first task above! 🚀</p>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Task</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="editTaskForm">
                <input type="hidden" id="editTaskId">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="editTaskTitle" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editTaskDescription" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="editTaskPriority">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" id="editTaskDueDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="editTaskCompleted">
                        Mark as completed
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
